name: Autonomous AI Playground Loop

on:
  schedule:
    - cron: '0 * * * *' # Triggers automatically every single hour
  workflow_dispatch: # Allows manual trigger from your iPhone GitHub app

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install AI & Arweave Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Autonomous Agent Loop
      env:
        ARWEAVE_KEY: ${{ secrets.ARWEAVE_WALLET_KEY }}
        HUGGINGFACE_TOKEN: ${{ secrets.HF_TOKEN }} # Optional: For higher-tier AI models
      run: |
        python src/ai_agent.py
