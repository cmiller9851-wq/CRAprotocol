name: PATRIOT_v2.0 Sovereign Saturation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  saturation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with Node 24
        uses: actions/checkout@v4
        with:
          node-version: 24  # Explicit override for deprecation

      - name: Install Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Run Sovereign Cycle
        run: python3 patriot_v2.0_sovereign_master.py full