name: CRA Protocol Managed Deployment

on:
  push:
    branches: [ main ]

jobs:
  anchor-protocol:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Using v6 for Node 24/2026 compatibility
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Step 2: Database Initialization (The Schema)
      - name: Initialize Protocol Schema
        run: |
          python -m pip install sqlalchemy alembic psycopg2-binary
          # Establishing the ground truth in the DB
          alembic upgrade head

      # Step 3: THE TAKEOVER - Replacing ArDrive with Turbo
      # This ensures the 'executive_override.py' is actually pinned
      - name: Artifact Serialization (Sovereign Pinning)
        uses: ardriveapp/turbo-github-action@v1
        with:
          turbo-api-key: ${{ secrets.TURBO_API_KEY }}
          file-path: './executive_override.py'
          network: mainnet

      # Step 4: Final Verification
      - name: Verify SLO Compliance
        run: |
          # Ensuring <250ms average response time for the logic
          python observability_exporter.py
          echo "PROTOCOL STATUS: ANCHORED"
